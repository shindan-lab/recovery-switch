const questions=[{id:1,text:'疲れた日の夜、いちばん自然に近いのは？',options:[{text:'誰にも反応しないで静かにいたい',scores:{A:3,H:1}},{text:'とにかく横になって眠りたい',scores:{B:3}},{text:'誰かに少し聞いてほしい気がする',scores:{C:3}},{text:'いったん外の空気を変えたい',scores:{D:3}}]},{id:2,text:'休んだはずなのに、あまり戻らなかった日に近いのは？',options:[{text:'静かな一人時間が足りなかった',scores:{A:3}},{text:'結局ちゃんと眠れていなかった',scores:{B:3}},{text:'気持ちを出せないまま終わった',scores:{C:2,F:1}},{text:'同じ場所にずっといて切り替わらなかった',scores:{D:3}}]},{id:3,text:'落ち着きたいとき、つい選びがちなのは？',options:[{text:'入浴や温かい飲み物など、いつもの整え方',scores:{E:3}},{text:'書き出したりメモしたりすること',scores:{F:3}},{text:'少し片づける、少し動くなど手を動かすこと',scores:{G:3}},{text:'何もしないで刺激を減らすこと',scores:{H:3}}]},{id:4,text:'気持ちが重い日に、わりと効きやすいのは？',options:[{text:'人と距離をとって静かに過ごすこと',scores:{A:2,H:1}},{text:'少しでも眠って区切ること',scores:{B:3}},{text:'少し話してほぐすこと',scores:{C:3}},{text:'散歩や外出で空気を変えること',scores:{D:3}}]},{id:5,text:'「なんか整ってきた」と感じる瞬間に近いのは？',options:[{text:'いつもの手順をなぞれたとき',scores:{E:3}},{text:'頭の中が言葉になったとき',scores:{F:3}},{text:'少し動いて流れが変わったとき',scores:{G:3}},{text:'情報や予定が減って静かになったとき',scores:{H:3}}]},{id:6,text:'「気分転換したら？」と言われたとき、しっくり来やすいのは？',options:[{text:'一人になれる時間をもらうこと',scores:{A:3}},{text:'まず休んで寝ること',scores:{B:3}},{text:'話を聞いてもらうこと',scores:{C:3}},{text:'少し外に出ること',scores:{D:3}}]},{id:7,text:'疲れたとき、逆にしんどくなりやすい休み方は？',options:[{text:'人と関わりすぎる休み方',scores:{A:3}},{text:'眠れないのに予定を入れること',scores:{B:3}},{text:'抱えたまま何も話せず終わること',scores:{C:2,F:1}},{text:'ずっと同じ場所でこもり続けること',scores:{D:3}}]},{id:8,text:'自分に「効くな」と感じやすい整え方は？',options:[{text:'香り・お風呂・飲み物など五感を整えること',scores:{E:3}},{text:'考えを書いて見える化すること',scores:{F:3}},{text:'軽く歩く、片づける、伸ばすなど少し動くこと',scores:{G:3}},{text:'スマホや予定を切って何も足さないこと',scores:{H:3}}]},{id:9,text:'元気がないとき、人から見れば地味でも自分には効くのは？',options:[{text:'一人で静かに過ごすこと',scores:{A:3}},{text:'寝る・横になること',scores:{B:3}},{text:'少し話して気持ちを外に出すこと',scores:{C:3}},{text:'少しだけ外へ出ること',scores:{D:3}}]},{id:10,text:'しんどいとき、ついやってしまう「戻るための動き」に近いのは？',options:[{text:'いつもの整え習慣に戻る',scores:{E:3}},{text:'メモや日記に書く',scores:{F:3}},{text:'片づけ、家事、散歩など少し手を動かす',scores:{G:3}},{text:'予定も情報も減らしてぼーっとする',scores:{H:3}}]},{id:11,text:'何となくモヤモヤするとき、回復の近道になりやすいのは？',options:[{text:'静かな時間をとって反応を減らす',scores:{A:2,H:1}},{text:'少しでも眠って区切る',scores:{B:2}},{text:'言葉にして整理する',scores:{C:1,F:2}},{text:'少し動いて流れを変える',scores:{D:1,G:2}}]},{id:12,text:'もし明日、自由に自分を回復させていいなら何を選ぶ？',options:[{text:'一人で静かに過ごせる時間',scores:{A:3}},{text:'しっかり眠れる時間',scores:{B:3}},{text:'書く・話す・整える時間',scores:{E:1,F:2,C:1}},{text:'少し動くか、何もしないかを自分で選べる余白',scores:{G:2,H:2}}]}];
const types={A:{name:'ひとり静養タイプ',headline:'あなたの回復スイッチは「一人で静かになること」です',body:'疲れたとき、人と話すより先に一人になりたくなる。予定が続くと、楽しいことでも少しずつ消耗していく。そんな傾向があるなら、あなたは“静かな単独時間”で回復しやすい人です。にぎやかさや刺激より、反応しなくていい時間が心をほどいてくれます。\n\nこのタイプは、さみしがりではないのに「今日は一人になりたい」と感じることがあります。それは気分の問題ではなく、回復に必要な条件です。一人時間を後回しにすると、休んだつもりでも戻りにくくなります。',letter:'誰かといるのが嫌なのではなく、自分に戻るための静かな時間が必要なんですよね。その感覚はわがままではなく、ちゃんとした回復のサインです。',prescription:'今日は10分だけでも、一人で反応しなくていい時間をつくってみてください。スマホを置いて、音を減らして、ただ静かに過ごすだけでも回復の入り口になります。'},B:{name:'眠って戻すタイプ',headline:'あなたの回復スイッチは「まず眠ること」にあります',body:'気分転換やごほうびよりも、まず睡眠。あなたは、心より先に体の休息不足がボトルネックになりやすいタイプです。疲れているときに予定を増やしても戻りにくく、しっかり休んだときにようやく気持ちもついてくることが多いはずです。\n\nこのタイプにとって、眠ることは“甘え”ではなく再起動です。睡眠不足のまま何とかしようとしても、回復の土台がないので戻りきれません。やる気ではなく、休息の量と質が最優先になります。',letter:'頑張り方の問題じゃなかったんですよね。まず休めていなかっただけ。眠ることを最優先にしていいタイプだと分かるだけでも、少し気持ちが軽くなるはずです。',prescription:'今夜は「やることを増やす」より「30分早く休む」を優先してみてください。睡眠が足りるだけで、明日の気分は思った以上に変わります。'},C:{name:'しゃべってほぐれるタイプ',headline:'あなたの回復スイッチは「気持ちを人に話すこと」です',body:'疲れたとき、一人で抱えていると余計に重くなる。でも、信頼できる相手に少し話せると、解決していなくても不思議と楽になる。あなたは、会話によって心がゆるみやすいタイプです。\n\nこのタイプに必要なのは、正しい助言よりも「わかるよ」「それはしんどいね」と受け止めてもらうことです。言葉にして外へ出す行為そのものが、回復のスイッチになっています。一人で整理しようとしすぎると、逆に詰まりやすくなります。',letter:'話したいのは弱さではなく、あなたに必要な回復手段なんですよね。ちゃんと人を頼れる感覚は、しなやかさでもあります。',prescription:'今日、信頼できる人に一言だけでも近況を送ってみてください。長文じゃなくて大丈夫です。「ちょっと疲れてる」だけでも、気持ちは少し動きます。'},D:{name:'外に出て巡るタイプ',headline:'あなたの回復スイッチは「場所と空気を変えること」です',body:'家の中でじっとしているより、少し外に出た方が気持ちが軽くなる。景色が変わると頭の詰まりもゆるむ。あなたは、環境の変化そのものが回復につながるタイプです。\n\nこのタイプは、落ち着きがないのではありません。空気、光、景色、移動といった「外から入る刺激の変化」が整えになっているんです。同じ場所で休み続けても回復しきれないことがあるのは、そのためです。',letter:'動きたい気持ちは、逃げたいからではなく整いたいからなんですよね。外へ向かう感覚は、あなたの回復本能です。',prescription:'今日は5〜10分でいいので、目的のない外出をしてみてください。コンビニまででも、公園まででも大丈夫です。場所が変わるだけで、思考の流れが変わります。'},E:{name:'ととのえ習慣タイプ',headline:'あなたの回復スイッチは「小さな整えの儀式」にあります',body:'疲れたとき、大きなイベントよりも、入浴や温かい飲み物、香り、夜のルーティンのような“いつもの整え方”で落ち着きやすい。あなたは、五感と習慣の安心感で戻るタイプです。\n\nこのタイプにとって大切なのは、派手な気分転換ではなく「整う順番」です。決まった流れがあると気持ちがほどけていきます。逆に、生活リズムや整え習慣が崩れると、何となく不安定になりやすい傾向があります。',letter:'あなたには、ちゃんと戻るための手順があるんですよね。その繊細さは面倒さではなく、自分を大切に扱う感覚です。',prescription:'今夜は一つだけ、自分が「整う感じ」のする習慣を意識的に入れてみてください。入浴、飲み物、香り、スキンケア。小さな儀式が心を戻してくれます。'},F:{name:'書いて整理するタイプ',headline:'あなたの回復スイッチは「頭の中を言葉にして外へ出すこと」です',body:'考えすぎるのではなく、考えが中に溜まりすぎる。そんな傾向があるなら、あなたは“書いて整理すること”で回復しやすいタイプです。頭の中だけで抱えていると混線しやすく、紙やメモに出すとようやく落ち着く感覚があるはずです。\n\nこのタイプに必要なのは、正しくまとめることではありません。散らかったままでも外に出すことです。言語化すると、感情や思考が輪郭を持ち、やっと呼吸しやすくなります。',letter:'頭の中に置いたままだと重かったものが、書くと少し軽くなる。その感覚は気のせいではなく、あなたに合った整え方なんです。',prescription:'今の気持ちを3行だけでいいのでメモに書いてみてください。きれいに書く必要はありません。外に出すこと自体が、回復のスイッチになります。'},G:{name:'小さく動いて整えるタイプ',headline:'あなたの回復スイッチは「少し動いて流れを変えること」です',body:'何もしないで休むより、机を少し片づける、洗い物を終える、軽く歩く、体を伸ばす。そんな“小さな動き”で気持ちが整いやすいなら、あなたは少し動くことで回復するタイプです。\n\nこのタイプは、休むのが下手なのではありません。止まりすぎると逆に重くなりやすいんです。少し進んだ、少し流れた、少し整った。その感覚があると、ようやく安心して力が抜けます。',letter:'動いてしまうのは落ち着きがないからではなく、整うために必要な手順だったんですね。その感覚を責めなくて大丈夫です。',prescription:'今日は2〜5分で終わる小さな動きを一つ入れてみてください。片づけ、散歩、ストレッチ、洗い物。大きな努力ではなく「流れを変える」くらいで十分です。'},H:{name:'余白で戻るタイプ',headline:'あなたの回復スイッチは「刺激を減らして、何も足さないこと」です',body:'疲れたとき、気分転換すら重い。誰かと会うのも、何かを選ぶのも、情報を見るのも少ししんどい。そんな感覚があるなら、あなたは“余白”で戻るタイプです。\n\nこのタイプに必要なのは、プラスの刺激ではなくマイナスの調整です。予定を減らす、判断を減らす、情報を減らす。何かしなきゃと足し算するより、まず引き算した方が心が戻ってきます。好きなものに触れることも、余白が戻ってからの方がちゃんと効きやすいタイプです。',letter:'何もしない時間が必要なのは、甘えではなく回復のためです。余白がないと戻れない人だと、まず自分が認めてあげてください。',prescription:'今日は10分だけでも「何も足さない時間」をつくってみてください。スマホを閉じて、予定も考えず、ただぼーっとする。それだけで十分です。'}};
let currentQuestion=0,answers=[],isAnswering=false;
function calcResult(answerList){const scores={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};answerList.forEach(ans=>{Object.entries(ans.scores).forEach(([type,pt])=>scores[type]+=pt)});const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);return{main:sorted[0][0],sub:sorted[1][0],scores}}
function getShareText(mainType){const url='https://shindan-lab.github.io/recovery-switch/';return `私の回復スイッチは「${types[mainType].name}」でした。\n休んでも戻らない理由、これかもしれない。\n\n▼あなたの回復スイッチ診断\n${url}\n\n#回復スイッチ診断 #診断Lab`;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'instant'});}
function renderQuestion(index){const q=questions[index],total=questions.length;document.getElementById('progress-text').textContent=`${index+1} / ${total}`;document.getElementById('progress-bar').style.width=`${((index+1)/total)*100}%`;document.getElementById('question-text').textContent=q.text;const list=document.getElementById('options-list');list.innerHTML='';q.options.forEach((opt,i)=>{const li=document.createElement('li');const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt.text;btn.addEventListener('click',()=>selectOption(i));li.appendChild(btn);list.appendChild(li);});document.getElementById('btn-back').disabled=(index===0);}
function selectOption(optionIndex){if(isAnswering)return;isAnswering=true;const buttons=document.querySelectorAll('.option-btn');buttons.forEach(btn=>btn.disabled=true);buttons[optionIndex].classList.add('selected');answers.push(questions[currentQuestion].options[optionIndex]);setTimeout(()=>{currentQuestion++;if(currentQuestion<questions.length){renderQuestion(currentQuestion);isAnswering=false;}else{showLoading();}},300);}
function goBack(){if(currentQuestion===0||isAnswering)return;currentQuestion--;answers.pop();renderQuestion(currentQuestion);}
function showLoading(){showScreen('screen-loading');setTimeout(showResult,1500);}
function showResult(){const result=calcResult(answers),mainType=types[result.main];document.getElementById('result-header-card').style.background=typeColors[result.main].gradient;document.getElementById('result-bg-letter').textContent=result.main;document.getElementById('result-icon').innerHTML=typeIcons[result.main];document.getElementById('result-type-name').textContent=mainType.name;document.getElementById('result-headline').textContent=mainType.headline;document.getElementById('result-body').innerHTML=mainType.body.split('\n\n').map(p=>`<p>${p}</p>`).join('');document.getElementById('result-letter').textContent=mainType.letter;document.getElementById('result-prescription').textContent=mainType.prescription;const affiliate=(typeof affiliateData!=='undefined')?affiliateData[result.main]:null;const affSection=document.getElementById('result-affiliate');if(affiliate&&affiliate.url){document.getElementById('affiliate-title').textContent=affiliate.title;document.getElementById('affiliate-desc').textContent=affiliate.desc;document.getElementById('affiliate-link').href=affiliate.url;affSection.style.display='block';}else{affSection.style.display='none';}const shareText=getShareText(result.main);document.getElementById('share-x').href='https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText);document.getElementById('share-threads').href='https://www.threads.net/intent/post?text='+encodeURIComponent(shareText);showScreen('screen-result');}
function startQuiz(){currentQuestion=0;answers=[];isAnswering=false;showScreen('screen-quiz');renderQuestion(0);}
function resetQuiz(){showScreen('screen-top');}
</script>
